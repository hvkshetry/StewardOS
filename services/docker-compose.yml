services:
  # ─── PostgreSQL (shared by paperless-ngx + ghostfolio + wger) ───
  personal-db:
    image: postgres:16.6
    container_name: personal-db
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:5433:5432"
    command: >
      postgres
      -c random_page_cost=4.0
      -c effective_io_concurrency=2
      -c shared_buffers=512MB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c max_connections=1000
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - personal-db-data:/var/lib/postgresql/data
      - ./personal-db/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    mem_limit: 1g
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - personal-net

  # ─── Redis (shared by paperless-ngx + ghostfolio) ───
  personal-redis:
    image: redis:7-alpine
    container_name: personal-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:6380:6379"
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - personal-redis-data:/data
    mem_limit: 256m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - personal-net

  # ─── Vaultwarden (password manager) ───
  vaultwarden:
    image: vaultwarden/server:1.35.2
    container_name: vaultwarden
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8222:80"
    environment:
      DOMAIN: ${VAULTWARDEN_DOMAIN}
      SIGNUPS_ALLOWED: ${VAULTWARDEN_SIGNUPS_ALLOWED:-false}
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN}
    volumes:
      - vaultwarden-data:/data
    mem_limit: 256m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/alive"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - personal-net

  # ─── Paperless-ngx (document management) ───
  paperless-ngx:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.20.7
    container_name: paperless-ngx
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8223:8000"
    depends_on:
      personal-db:
        condition: service_healthy
      personal-redis:
        condition: service_healthy
    environment:
      PAPERLESS_REDIS: redis://personal-redis:6379/0
      PAPERLESS_DBHOST: personal-db
      PAPERLESS_DBPORT: "5432"
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: postgres
      PAPERLESS_DBPASS: ${POSTGRES_PASSWORD}
      PAPERLESS_OCR_PAGES: "1"
      PAPERLESS_TASK_WORKERS: "1"
      PAPERLESS_ENABLE_NLTK: "false"
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY}
      PAPERLESS_URL: https://docs.stewardos.example.com
      PAPERLESS_APP_TITLE: "StewardOS Documents"
      # PAPERLESS_APP_LOGO: "/logo/your-logo.jpg"
    volumes:
      - paperless-data:/usr/src/paperless/data
      - paperless-media:/usr/src/paperless/media
      - paperless-consume:/usr/src/paperless/consume
      - ./paperless-base.css:/usr/src/paperless/static/base.css:ro
    mem_limit: 1536m
    cpus: 2.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - personal-net

  # ─── Ghostfolio (investment tracker) ───
  ghostfolio:
    image: ghostfolio/ghostfolio:2.243.0
    container_name: ghostfolio
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8224:3333"
    depends_on:
      personal-db:
        condition: service_healthy
      personal-redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@personal-db:5432/ghostfolio
      REDIS_HOST: personal-redis
      REDIS_PORT: "6379"
      REDIS_DB: "1"
      # Throttle Yahoo-backed background workers to avoid 429 rate-limit lockouts.
      PROCESSOR_GATHER_ASSET_PROFILE_CONCURRENCY: "${GHOSTFOLIO_PROCESSOR_GATHER_ASSET_PROFILE_CONCURRENCY:-1}"
      PROCESSOR_GATHER_HISTORICAL_MARKET_DATA_CONCURRENCY: "${GHOSTFOLIO_PROCESSOR_GATHER_HISTORICAL_MARKET_DATA_CONCURRENCY:-1}"
      ACCESS_TOKEN_SALT: ${GHOSTFOLIO_ACCESS_TOKEN_SALT}
      JWT_SECRET_KEY: ${GHOSTFOLIO_JWT_SECRET_KEY}
    mem_limit: 1g
    cpus: 2.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3333/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - personal-net

  # ─── Mealie (recipe manager) ───
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v3.11.0
    container_name: mealie
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:9925:9000"
    environment:
      ALLOW_SIGNUP: "false"
      TZ: America/New_York
      BASE_URL: https://meals.stewardos.example.com
    volumes:
      - mealie-data:/app/data
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/api/app/about')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - personal-net

  # ─── Actual Budget (budgeting) ───
  actual-budget:
    image: actualbudget/actual-server:26.2.1
    container_name: actual-budget
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:5006:5006"
    volumes:
      - actual-data:/data
    # 128m proved too tight under concurrent sync traffic and triggered OOM kills.
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http = require('http'); http.get('http://localhost:5006/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - personal-net

  # ─── Memos (notes / quick capture) ───
  memos:
    image: neosmemo/memos:0.26.1
    container_name: memos
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:5230:5230"
    volumes:
      - memos-data:/var/opt/memos
    mem_limit: 256m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5230/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - personal-net

  # ─── Homebox (home inventory) ───
  homebox:
    image: ghcr.io/sysadminsmedia/homebox:0.23.1
    container_name: homebox
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:3100:7745"
    environment:
      HBOX_WEB_MAX_UPLOAD_SIZE: "10"
      HBOX_WEB_ALLOW_REGISTRATION: "false"
    volumes:
      - homebox-data:/data
    mem_limit: 256m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7745/api/v1/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - personal-net

  # ─── Grocy (pantry inventory) ───
  grocy:
    image: lscr.io/linuxserver/grocy:4.5.0
    container_name: grocy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:9283:80"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/New_York
    volumes:
      - grocy-data:/config
    mem_limit: 128m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - personal-net

  # ─── wger (workout & nutrition tracker) ───
  wger-web:
    image: wger/server:2.3-dev@sha256:c63947d589c115e777b99154422599a5b23e9314268c9603210bbd047598a9f9
    container_name: wger-web
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8280:8000"
    depends_on:
      personal-db:
        condition: service_healthy
      personal-redis:
        condition: service_healthy
    environment: &wger-env
      DJANGO_DB_ENGINE: django.db.backends.postgresql
      DJANGO_DB_DATABASE: wger
      DJANGO_DB_USER: postgres
      DJANGO_DB_PASSWORD: ${POSTGRES_PASSWORD}
      DJANGO_DB_HOST: personal-db
      DJANGO_DB_PORT: "5432"
      DJANGO_CACHE_BACKEND: django_redis.cache.RedisCache
      DJANGO_CACHE_LOCATION: redis://personal-redis:6379/2
      DJANGO_CACHE_TIMEOUT: "1296000"
      DJANGO_CACHE_CLIENT_CLASS: django_redis.client.DefaultClient
      CELERY_BROKER: redis://personal-redis:6379/2
      CELERY_BACKEND: redis://personal-redis:6379/2
      SITE_URL: https://fitness.stewardos.example.com
      CSRF_TRUSTED_ORIGINS: https://fitness.stewardos.example.com
      X_FORWARDED_PROTO_HEADER_SET: "True"
      SECRET_KEY: ${WGER_SECRET_KEY}
      DJANGO_PERFORM_MIGRATIONS: "True"
      TIME_ZONE: America/New_York
      EXERCISE_CACHE_TTL: "18000"
      WGER_INSTANCE: https://wger.de
      ALLOW_REGISTRATION: "false"
      ALLOW_GUEST_USERS: "false"
      USE_RECAPTCHA: "false"
    volumes:
      - wger-static:/home/wger/static
      - wger-media:/home/wger/media
    mem_limit: 256m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/v2/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - personal-net

  wger-celery-worker:
    image: wger/server:2.3-dev@sha256:c63947d589c115e777b99154422599a5b23e9314268c9603210bbd047598a9f9
    container_name: wger-celery-worker
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: celery -A wger worker -l INFO --concurrency=1
    depends_on:
      - wger-web
    environment:
      <<: *wger-env
    volumes:
      - wger-media:/home/wger/media
    mem_limit: 256m
    cpus: 1.0
    networks:
      - personal-net

  wger-celery-beat:
    image: wger/server:2.3-dev@sha256:c63947d589c115e777b99154422599a5b23e9314268c9603210bbd047598a9f9
    container_name: wger-celery-beat
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: /start-beat
    depends_on:
      - wger-web
    environment:
      <<: *wger-env
    mem_limit: 64m
    cpus: 0.5
    networks:
      - personal-net

  wger-nginx:
    image: nginx:1.28.2-alpine3.23
    container_name: wger-nginx
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8281:80"
    depends_on:
      - wger-web
    volumes:
      - ./wger/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - wger-static:/wger/static:ro
      - wger-media:/wger/media:ro
    mem_limit: 32m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - personal-net

  # ─── Watchtower (automatic Docker image updates) ───
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: America/New_York
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_SCHEDULE: "0 0 4 * * *"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_TIMEOUT: "60s"
      WATCHTOWER_NOTIFICATION_URL: ${WATCHTOWER_NOTIFICATION_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    mem_limit: 64m
    cpus: 0.5
    networks:
      - personal-net

  # ─── Plane PM (project management) ───
  plane-valkey:
    image: valkey/valkey:7.2-alpine
    container_name: plane-valkey
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: valkey-server --save 60 1 --loglevel warning
    volumes:
      - plane-valkey-data:/data
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - personal-net

  plane-mq:
    image: rabbitmq:3.13-alpine
    container_name: plane-mq
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      RABBITMQ_DEFAULT_USER: ${PLANE_RABBITMQ_USER:-plane}
      RABBITMQ_DEFAULT_PASS: ${PLANE_RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: plane
    volumes:
      - plane-mq-data:/var/lib/rabbitmq
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - personal-net

  plane-minio:
    image: minio/minio:latest
    container_name: plane-minio
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: server /data --console-address ":9090"
    environment:
      MINIO_ROOT_USER: ${PLANE_MINIO_ROOT_USER:-plane}
      MINIO_ROOT_PASSWORD: ${PLANE_MINIO_ROOT_PASSWORD}
    volumes:
      - plane-minio-data:/data
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - personal-net

  plane-migrator:
    image: makeplane/plane-backend:stable
    container_name: plane-migrator
    restart: "no"
    command: ./bin/docker-entrypoint-migrator.sh
    depends_on:
      personal-db:
        condition: service_healthy
      plane-valkey:
        condition: service_healthy
    environment: &plane-env
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@personal-db:5432/plane
      REDIS_URL: redis://plane-valkey:6379/
      RABBITMQ_HOST: plane-mq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${PLANE_RABBITMQ_USER:-plane}
      RABBITMQ_PASSWORD: ${PLANE_RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: plane
      AWS_ACCESS_KEY_ID: ${PLANE_MINIO_ROOT_USER:-plane}
      AWS_SECRET_ACCESS_KEY: ${PLANE_MINIO_ROOT_PASSWORD}
      AWS_S3_ENDPOINT_URL: http://plane-minio:9000
      AWS_S3_BUCKET_NAME: plane-uploads
      AWS_REGION: ""
      USE_MINIO: "1"
      SECRET_KEY: ${PLANE_SECRET_KEY}
      MACHINE_SIGNATURE: ${PLANE_MACHINE_SIGNATURE}
      WEB_URL: https://pm.stewardos.example.com
      CORS_ALLOWED_ORIGINS: https://pm.stewardos.example.com
      API_KEY_RATE_LIMIT: "300/minute"
      GUNICORN_WORKERS: "1"
    mem_limit: 128m
    cpus: 0.5
    networks:
      - personal-net

  plane-api:
    image: makeplane/plane-backend:stable
    container_name: plane-api
    restart: unless-stopped
    command: ./bin/docker-entrypoint-api.sh
    depends_on:
      personal-db:
        condition: service_healthy
      plane-valkey:
        condition: service_healthy
      plane-mq:
        condition: service_healthy
      plane-migrator:
        condition: service_completed_successfully
    environment:
      <<: *plane-env
    mem_limit: 512m
    cpus: 1.0
    networks:
      personal-net:
        aliases:
          - api

  plane-worker:
    image: makeplane/plane-backend:stable
    container_name: plane-worker
    restart: unless-stopped
    command: ./bin/docker-entrypoint-worker.sh
    depends_on:
      plane-api:
        condition: service_started
    environment:
      <<: *plane-env
    mem_limit: 512m
    cpus: 1.0
    networks:
      - personal-net

  plane-beat:
    image: makeplane/plane-backend:stable
    container_name: plane-beat
    restart: unless-stopped
    command: ./bin/docker-entrypoint-beat.sh
    depends_on:
      plane-api:
        condition: service_started
    environment:
      <<: *plane-env
    mem_limit: 128m
    cpus: 0.5
    networks:
      - personal-net

  plane-web:
    image: makeplane/plane-frontend:stable
    container_name: plane-web
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 1.0
    networks:
      personal-net:
        aliases:
          - web

  plane-admin:
    image: makeplane/plane-admin:stable
    container_name: plane-admin
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 0.5
    networks:
      personal-net:
        aliases:
          - admin

  plane-space:
    image: makeplane/plane-space:stable
    container_name: plane-space
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 192m
    cpus: 0.5
    networks:
      personal-net:
        aliases:
          - space

  plane-live:
    image: makeplane/plane-live:stable
    container_name: plane-live
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      plane-valkey:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api:8000
      REDIS_URL: redis://plane-valkey:6379/
      LIVE_SENTRY_DSN: ""
      LIVE_SENTRY_ENVIRONMENT: ""
      LIVE_SENTRY_TRACES_SAMPLE_RATE: ""
    mem_limit: 256m
    cpus: 0.5
    networks:
      personal-net:
        aliases:
          - live

  plane-proxy:
    image: makeplane/plane-proxy:stable
    container_name: plane-proxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8082:80"
    depends_on:
      - plane-web
      - plane-api
      - plane-space
      - plane-admin
      - plane-live
    environment:
      FILE_SIZE_LIMIT: 5242880
      BUCKET_NAME: plane-uploads
      SITE_ADDRESS: ":80"
    mem_limit: 32m
    cpus: 0.5
    networks:
      - personal-net

  # ─── Cloudflared ───
  # Removed: cloudflared Docker container is no longer used.
  # All tunnel routing (SSH + web services) is handled by the host-level
  # systemd cloudflared service (/etc/systemd/system/cloudflared.service).
  # Ingress rules are configured in the Cloudflare Zero Trust dashboard
  # (TUNNEL_TOKEN mode) and point to localhost ports.

networks:
  personal-net:
    driver: bridge

volumes:
  personal-db-data:
  personal-redis-data:
  vaultwarden-data:
  paperless-data:
  paperless-media:
  paperless-consume:
  mealie-data:
  actual-data:
  memos-data:
  homebox-data:
  grocy-data:
  wger-static:
  wger-media:
  plane-valkey-data:
  plane-mq-data:
  plane-minio-data:
