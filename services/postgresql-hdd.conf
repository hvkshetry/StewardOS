# HDD-optimized PostgreSQL overrides for home-server m7 (1TB SATA HDD)
#
# This file is kept as documentation/reference. The actual tuning is applied
# via -c flags in docker-compose.yml command: directive, since the official
# postgres:16.6 image doesn't have /etc/postgresql/conf.d/ pre-created.
#
# To apply via volume mount instead, create the dir in the container entrypoint
# and use include_dir.

random_page_cost = 4.0          # HDD: seeks are expensive (default 4.0, SSD would be 1.1)
effective_io_concurrency = 2    # Single spindle
shared_buffers = 512MB          # ~25% of usable RAM after Docker overhead
work_mem = 16MB                 # Per-sort/hash, conservative for 2c/4t
maintenance_work_mem = 128MB    # VACUUM, CREATE INDEX
wal_buffers = 16MB
checkpoint_completion_target = 0.9
